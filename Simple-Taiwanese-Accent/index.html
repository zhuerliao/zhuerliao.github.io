<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Taiwanese Accent</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="wrap">
    <div class="scale-wrapper">
    <div class="main-container">
        <div class="simple-background">
            <div class="button-group">
                <button class="btn rule">
                    <span class="rule-zh">互動規則</span>
                    <span class="rule-en">Interaction rules</span>
                </button>

                <button class="btn enter" id="indexStartBtn">
                    <span class="rule-zh">開始互動</span>
                    <span class="rule-en">Start interaction</span>
                </button>
            </div>
        </div>
    </div>
</div>
</div>

<script src="index.js"></script>

</body>
</html>
