<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Taiwanese Accent Selection</title>
    <link rel="stylesheet" href="selection.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <div class="wrap">
        <div class="main-container">
        <div class="selection-background">
            <div class="swiper-container">
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide" data-url="welcome.html">
                            <div class="card-content">
                                <img src="image/simple-welcome.png" alt="緩光臨">
                            </div>
                        </div>
                    </div>
                    
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-pagination"></div>
                </div>
            </div>

            <div class="go-back-container">
                <button class="btn go-back">
                    <span class="zh">回首頁</span>
                    <span class="en">Go back</span>
                </button>
            </div>
        </div>
    </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="layout.js"></script>
    <script src="selection.js"></script>
</body>
</html>
